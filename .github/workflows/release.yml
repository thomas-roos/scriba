name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libssl-dev pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/scriba dist/scriba-${{ matrix.target }}

      - name: Generate checksums
        run: |
          cd dist
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            shasum -a 256 scriba-${{ matrix.target }} > scriba-${{ matrix.target }}.sha256
          else
            sha256sum scriba-${{ matrix.target }} > scriba-${{ matrix.target }}.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scriba-${{ matrix.target }}
          path: dist/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -name "scriba-*" -type f -exec cp {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        id: release
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -name "scriba-*" -type f -exec cp {} release/ \;

      - name: Compute macOS checksums
        id: sums
        run: |
          cd release
          echo "macos_x86_sha=$(shasum -a 256 scriba-x86_64-apple-darwin | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "macos_arm_sha=$(shasum -a 256 scriba-aarch64-apple-darwin | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula in main repo
        run: |
          # Fetch main branch and checkout (we're currently in detached HEAD from tag)
          git fetch origin main
          git checkout -b main origin/main
          
          # Update the formula
          mkdir -p Formula
          cat > Formula/scriba.rb << EOF
          class Scriba < Formula
            desc "Modern CLI tool for recording and transcribing audio using OpenAI Whisper"
            homepage "https://github.com/giovannialberto/scriba"
            version "${{ steps.release.outputs.version }}"
            
            if Hardware::CPU.intel?
              url "https://github.com/giovannialberto/scriba/releases/download/v${{ steps.release.outputs.version }}/scriba-x86_64-apple-darwin"
              sha256 "${{ steps.sums.outputs.macos_x86_sha }}"
            else
              url "https://github.com/giovannialberto/scriba/releases/download/v${{ steps.release.outputs.version }}/scriba-aarch64-apple-darwin"
              sha256 "${{ steps.sums.outputs.macos_arm_sha }}"
            end
            
            def install
              bin.install "scriba-#{Hardware::CPU.intel? ? "x86_64" : "aarch64"}-apple-darwin" => "scriba"
            end
            
            test do
              assert_match version.to_s, shell_output("#{bin}/scriba --version")
            end
          end
          EOF
          
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add Formula/scriba.rb
          git commit -m "feat: update Homebrew formula to v${{ steps.release.outputs.version }}"
          git push origin main

      # Removed external tap update: formula is maintained in this repo
